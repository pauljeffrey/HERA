# Dokploy deployment compose — backend only. Redis and (if you use it)
# Postgres are assumed to already be running as separate Dokploy services on
# the shared project network; this file does not define them.
#
# Environment variables
# ---------------------
# Paste all config in the Dokploy app "Environment" UI. Dokploy writes them to
# a `.env` file in this directory (backend/) at deploy time. The `env_file`
# entry below loads that file into the container — no repo-root `.env` needed.
#
# Required in Dokploy UI (see ../.env.example for full list):
#   SUPABASE_URL, SUPABASE_SECRET_KEY
#   MODEL_API_KEY or OPENAI_API_KEY
#   REDIS_SERVER_HOST, REDIS_SERVER_PORT, REDIS_PASSWORD  (your Dokploy Redis)
#   SUPABASE_DB_HOST, SUPABASE_DB_USER, SUPABASE_DB_PASSWORD  (pooler host)
#   PINECONE_API_KEY  (if VECTOR_BACKEND=pinecone)
#   PUBLIC_BASE_URL=https://your-hera-domain.example.com
#
# Adjust `networks.dokploy-network.name` to match the external network your
# Redis service is attached to (`docker network ls` on the Dokploy host).

services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      # Prod overrides — these win over values in Dokploy's generated .env
      HERA_RELOAD: "0"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
