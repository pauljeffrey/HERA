services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hera
      POSTGRES_PASSWORD: hera
      POSTGRES_DB: hera
    ports:
      - "5433:5432"
    volumes:
      - hera_pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hera"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redispassword
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispassword", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://hera:hera@postgres:5432/hera
      REDIS_URL: redis://:redispassword@redis:6379/0
      MOCK_MODE: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://hera:hera@postgres:5432/hera
      REDIS_URL: redis://:redispassword@redis:6379/0
      MOCK_MODE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: arq app.workers.arq_app.WorkerSettings

volumes:
  hera_pgdata:
